# Haelt die Fahrplandaten aktuell: laedt woechentlich den offiziellen
# VVS-GTFS-Feed (CC BY 4.0, https://mobidata-bw.de/sv/dataset/soll-fahrplandaten-vvs),
# bereitet ihn mit tools/prepare_data.py auf und committet Aenderungen.
# GitHub Pages deployt danach automatisch neu.

name: GTFS-Daten aktualisieren

on:
  schedule:
    - cron: "23 3 * * 1" # montags 03:23 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: GTFS-Feed herunterladen
        env:
          GTFS_URL: https://download.vvs.de/gtfs_realtime.zip
        run: |
          curl -fL --retry 3 --max-time 900 -o gtfs.zip "$GTFS_URL"
          mkdir -p gtfs
          unzip -o gtfs.zip -d gtfs

      - name: Daten aufbereiten
        env:
          GTFS_DIR: gtfs
        run: python tools/prepare_data.py

      - name: Aenderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "Keine Datenaenderungen."
          else
            git commit -m "Daten: GTFS-Update vom $(date -u +%F)"
            git push
          fi
