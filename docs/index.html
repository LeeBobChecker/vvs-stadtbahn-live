<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stuttgart Stadtbahn Live</title>
  <meta name="theme-color" content="#0067b1">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="css/style.css?v=7">
</head>
<body>
  <div id="map"></div>

  <header id="topbar">
    <div class="brand">
      <span class="brand-logo">U</span>
      <div class="brand-text">
        <h1>Stuttgart Stadtbahn</h1>
        <span id="source-badge" class="badge badge-sim" title="Positionen werden aus dem GTFS-Fahrplan berechnet. Sobald die Echtzeit-API freigeschaltet ist, wird sie hier angebunden.">Fahrplan&#8209;Simulation</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="stat">
        <span id="veh-count">0</span>
        <label>Bahnen</label>
      </div>
      <div class="stat">
        <span id="clock">--:--:--</span>
        <label id="clock-label">Uhrzeit</label>
      </div>
      <button id="btn-panel" class="icon-btn" title="Bedienfeld ausblenden">&#9776;</button>
      <button id="btn-theme" class="icon-btn" title="Heller Modus">&#9728;</button>
    </div>
  </header>

  <aside id="panel">
    <div class="panel-section">
      <div class="panel-heading"><span>Datenquelle</span></div>
      <div class="seg" id="source-toggle">
        <button class="seg-btn active" data-mode="sim">Simulation</button>
        <button class="seg-btn" data-mode="live">Live (API)</button>
      </div>
      <p class="hint" id="source-hint"></p>
    </div>
    <div class="panel-section">
      <div class="panel-heading">
        <span>Linien</span>
        <button id="btn-all-lines" class="mini-btn">alle</button>
      </div>
      <div id="line-chips"></div>
    </div>
    <div class="panel-section">
      <div class="panel-heading"><span>Favoriten</span></div>
      <div class="search-box">
        <input id="station-search" type="search" placeholder="Haltestelle suchen &hellip;"
               autocomplete="off" spellcheck="false">
      </div>
      <div id="search-results"></div>
      <div id="fav-list"></div>
    </div>
    <div class="panel-section" id="departures-section" hidden>
      <div class="panel-heading"><span>Abfahrten</span></div>
      <div id="dep-board"></div>
    </div>
    <div class="panel-section">
      <div class="panel-heading"><span>Zeit</span></div>
      <div class="time-controls">
        <button class="time-btn" data-shift="-3600">&minus;1&#8202;h</button>
        <button class="time-btn" data-shift="-600">&minus;10&#8202;min</button>
        <button class="time-btn" id="btn-now">jetzt</button>
        <button class="time-btn" data-shift="600">+10&#8202;min</button>
        <button class="time-btn" data-shift="3600">+1&#8202;h</button>
      </div>
      <p class="hint">Zeitreise, um den Betrieb zu anderen Uhrzeiten zu sehen.</p>
    </div>
  </aside>

  <div id="follow-chip" hidden>
    <span class="follow-dot"></span>
    <span id="follow-label"></span>
    <button id="follow-stop" title="Nicht mehr folgen">&times;</button>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p>Lade Liniennetz &amp; Fahrplan &hellip;</p>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/datasource.js?v=7"></script>
  <script src="js/app.js?v=7"></script>
</body>
</html>
